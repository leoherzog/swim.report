name = "swim-report"
main = "src/index.js"
compatibility_date = "2026-07-13"
routes = [
  { pattern = "swim.report", custom_domain = true }
]

[observability]
enabled = true
head_sampling_rate = 1

[placement]
mode = "smart"

# Workers Cache: regional tiered response cache in front of the Worker
# (wrangler >= 4.69). Only responses carrying cacheable Cache-Control
# directives are stored — src/router.js sets an explicit policy per route
# (no-store on the geolocation-personalized home page; short max-age +
# stale-while-revalidate on detail pages and /api/*). Request path only;
# crons are unaffected.
[cache]
enabled = true

# 7 * * * *        — hourly flag recompute (estimates + official scrapes -> KV).
#                    Offset off the congested top-of-hour :00 slot the repo's own
#                    GH workflows deliberately avoid; still reads (never fetches)
#                    the waveinput: KV the :15 wave cron last wrote.
# 15 */6 * * *     — 6-hourly wave/wind refresh (Open-Meteo/GLOS -> KV)
# 17 3,9,15,21 * * * — NWS point enrichment, 4x daily
# 29 4,10,16,22 * * * — ECCC zone enrichment, 4x daily (Canadian beaches the
#                    NWS enrichment permanently parked)
# 31 9 * * *       — daily Windy webcam hydration
#
# beaches.marine_zone is now derived OFFLINE by the GitHub Actions discovery
# batch (a nearest-marine-zone point-in-polygon pass over the repo-committed NWS
# marine-zone shapefile geometry in data/marine-zones-greatlakes.json), replacing
# the retired in-Worker marine enrichment cron. Beach discovery (Overpass) and
# water-body classification also run only in that offline batch
# (scripts/discovery-batch.js), which emits an idempotent SQL delta bulk-loaded
# into D1 out-of-band. The request path still reads only D1/KV.
[triggers]
crons = ["7 * * * *", "15 */6 * * *", "17 3,9,15,21 * * *", "29 4,10,16,22 * * *", "31 9 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "swim-report"
database_id = "694e08f2-01dd-4ece-9bd3-61da4c6f8481"

[[kv_namespaces]]
binding = "FLAGS"
id = "d7814f3408de401e8fef467754c18381"
