name: Beach discovery + water classification

# Offline replacement for the in-Worker runOverpassSync (47 8 * * *) and
# runWaterClassification (37 1,7,13,19 * * *) crons. Runs the SAME discovery +
# classification code (scripts/discovery-batch.js imports it verbatim from src/),
# emits one idempotent .sql delta, and bulk-loads it into production D1 with
# `wrangler d1 execute --remote --file`. See docs/offline-discovery.md.
#
# Requires one repository secret:
#   CLOUDFLARE_API_TOKEN  — value = the CLOUDFLARE_TOKEN in .dev.vars (a token
#                           with D1 edit scope on the swim-report database).
# No npm private-registry tokens are needed: this job never runs `npm install`/
# `npm ci` in the repo (which would reify package.json's private
# @web.awesome.me / @fortawesome deps and fail E401). Every wrangler call goes
# through `npx --yes wrangler@<pin>`, which fetches only wrangler from the
# default registry and never consults the repo's package.json.

on:
  # Daily, offset from the old in-Worker discovery cron's 08:47 UTC slot. GitHub
  # cron is UTC and best-effort (can lag several minutes under load).
  schedule:
    - cron: "47 8 * * *"
  # Manual runs: choose whether to apply to D1 or just produce the .sql artifact,
  # and cap classification for a quick incremental pass.
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply the generated SQL to production D1 (false = dry run, artifact only)"
        type: boolean
        default: true
      classify_limit:
        description: "Max beaches to (re)classify this run (0 = all eligible)"
        type: string
        default: "0"

concurrency:
  # Overpass allows 2 slots per IP and the D1 write is not safely re-entrant —
  # never let two discovery runs overlap.
  group: discovery
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # A minimal D1-only API token can't enumerate GET /accounts to auto-discover
      # the account, so wrangler needs the account ID handed to it explicitly.
      # Account IDs are not secret (they ship in wrangler.toml / dashboard URLs).
      CLOUDFLARE_ACCOUNT_ID: 0e01552527359dfcce6edc27ebedb530
      DB_NAME: swim-report
      # Pin to the wrangler MAJOR line (matches package.json's `^4.112.0`), so the
      # unattended job gets 4.x fixes automatically but a future wrangler 5 can
      # never silently change flags / `--file` parsing under a scheduled run.
      WRANGLER_VERSION: "4"
      # workflow_dispatch inputs are absent on scheduled runs — default there.
      APPLY: ${{ github.event_name == 'schedule' && 'true' || inputs.apply }}
      CLASSIFY_LIMIT: ${{ github.event_name == 'schedule' && '0' || inputs.classify_limit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Node (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # NOTE: we do NOT `npm install`/`npm ci` here. Any npm install in the repo
      # root reifies the whole package.json — including the private
      # @web.awesome.me / @fortawesome deps whose registry tokens this job does
      # not have — and fails E401. Instead every wrangler call goes through
      # `npx --yes wrangler@<pin>`, which fetches ONLY wrangler from the default
      # registry and never consults the repo's package.json. (setup-node above
      # provides the node/npx runtime.)

      - name: Snapshot current beaches from D1
        # The batch job needs the current table for reconciliation deletes and to
        # skip already-classified rows. Read-only. Guarded against a silently
        # truncated snapshot (D1's --json response is size-capped) by comparing
        # the row count to SELECT COUNT(*).
        run: |
          # --json writes API errors (bad token, missing DB) to STDOUT, so a
          # naive `> snapshot.json` swallows them and the step fails with a blank
          # log. Capture the exit code and surface the file on failure.
          if ! npx --yes "wrangler@${WRANGLER_VERSION}" d1 execute "$DB_NAME" --remote --json \
            --command "SELECT id, osm_id, name, lat, lon, park_name, water_class, water_class_version, water_class_attempts FROM beaches" \
            > snapshot.json; then
            echo "::error::wrangler snapshot query failed (likely a bad CLOUDFLARE_API_TOKEN secret) — response below"
            cat snapshot.json
            exit 1
          fi
          echo "snapshot bytes: $(wc -c < snapshot.json)"
          total=$(npx --yes "wrangler@${WRANGLER_VERSION}" d1 execute "$DB_NAME" --remote --json \
            --command "SELECT COUNT(*) AS n FROM beaches" \
            | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const r=JSON.parse(s);console.log(r[0].results[0].n)})")
          snap=$(node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const p=JSON.parse(s);const rows=Array.isArray(p)?((p[0]&&p[0].results)||[]):[];console.log(rows.length)})" < snapshot.json)
          echo "snapshot rows: $snap / db rows: $total"
          if [ "$snap" != "$total" ]; then
            echo "::error::snapshot truncated ($snap of $total rows) — aborting so reconciliation/classification never run on a partial table"
            exit 1
          fi

      - name: Run discovery + classification (emit SQL)
        run: |
          deno run --allow-net --allow-read --allow-write \
            scripts/discovery-batch.js \
            --snapshot snapshot.json \
            --out discovery-delta.sql \
            --classify-limit "${CLASSIFY_LIMIT:-0}"
          echo "---- delta summary ----"
          grep -c ';' discovery-delta.sql | xargs echo "statements:"
          head -n 20 discovery-delta.sql

      - name: Upload SQL delta artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovery-delta-sql
          path: discovery-delta.sql
          retention-days: 14

      - name: Apply SQL to production D1
        if: ${{ env.APPLY == 'true' }}
        run: |
          if ! npx --yes "wrangler@${WRANGLER_VERSION}" d1 execute "$DB_NAME" --remote --file discovery-delta.sql; then
            echo "::error::wrangler apply failed (check CLOUDFLARE_API_TOKEN secret and delta SQL)"
            exit 1
          fi
