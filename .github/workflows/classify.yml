name: Water-body classification

# Offline replacement for the retired in-Worker runWaterClassification
# ("37 1,7,13,19 * * *") cron. Runs the classify-only half of
# scripts/discovery-batch.js (--no-discovery --classify-limit N): NO Overpass
# tiling, NO upserts, NO reconciliation, NO deletes — it reads the current D1
# snapshot, probes Overpass for the water body next to each beach still needing
# classification (up to CLASSIFY_LIMIT per run, lowest-attempts-first), and emits
# ONLY water_class UPDATEs, bulk-loaded into production D1.
#
# WHY SEPARATE FROM discovery.yml: classification is hundreds of SEQUENTIAL
# per-beach Overpass probes — the pipeline's long pole. Running it in its own
# workflow with a bounded per-run limit lets it drain the queue over many short
# runs on its own cadence, so it can never starve or blow the time budget of the
# fast, delete-bearing discovery pass. A per-beach probe failure is non-fatal
# (the row just stays queued for the next run), so this workflow has no
# all-or-nothing abort. See docs/offline-discovery.md.
#
# Requires the same CLOUDFLARE_API_TOKEN repository secret as discovery.yml, and
# likewise never runs `npm install` (npx --yes wrangler@<pin> only).

on:
  # Hourly, small chunks: 25 beaches/run (same ~600/day throughput as the old
  # 4x-daily 150/run cadence) so each run is a short, polite Overpass burst that
  # finishes in minutes — an Overpass 504 window is unlikely to span a whole run,
  # and the budget/truncate machinery below becomes defense-in-depth instead of
  # load-bearing. Minute 23 is offset from discovery.yml (47 8) and off the
  # congested top-of-hour slot (GitHub cron is best-effort UTC: runs drift
  # minutes and occasionally skip — harmless for a queue drain, the next run
  # picks up). Once the backlog drains, most runs emit zero UPDATEs; the delta-
  # summary step below tolerates that (grep -c guard) so a no-op run stays green.
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply the generated SQL to production D1 (false = dry run, artifact only)"
        type: boolean
        default: true
      classify_limit:
        description: "Max beaches to (re)classify this run (0 = all eligible)"
        type: string
        default: "150"
      budget_min:
        description: "Self-imposed wall-clock cap on the classify loop, minutes (< the 90-min job timeout)"
        type: string
        default: "60"

concurrency:
  # The D1 write is not safely re-entrant — never let two classify runs overlap.
  # A distinct group from discovery so classification and discovery CAN run
  # concurrently (they touch disjoint columns: discovery writes name/lat/lon/
  # park_name + deletes; classify writes only water_class*).
  group: classify
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 0e01552527359dfcce6edc27ebedb530
      DB_NAME: swim-report
      WRANGLER_VERSION: "4"
      APPLY: ${{ github.event_name == 'schedule' && 'true' || inputs.apply }}
      # Scheduled runs drain 25/hour (~600/day); manual runs default to a 150
      # bulk chunk and can override (0 = all eligible).
      CLASSIFY_LIMIT: ${{ github.event_name == 'schedule' && '25' || inputs.classify_limit }}
      # Self-imposed wall-clock budget (minutes) for the classify loop, well under
      # timeout-minutes: 90. A scheduled 25-probe run finishes in minutes and will
      # never touch this; it protects MANUAL bulk runs (classify_limit 150 or
      # 0 = full drain), where under public-Overpass 504 storms 150 sequential
      # probes once overran 90 min and got CANCELLED — skipping Apply and
      # persisting zero progress. The budget makes the run return exit 0 with
      # margin so Apply runs normally (and classify SQL is flushed incrementally
      # as a SIGKILL net).
      # 60 (not 70) leaves real headroom: the budget is only checked at the TOP of
      # each loop iteration, so a probe already in flight can overhang by up to one
      # full 2-mirror Overpass timeout (~8 min); 60 + ~4 min job setup + ~8 min
      # overhang + ~2 min apply ≈ 74 min, ~16 min under the 90-min hard cap.
      CLASSIFY_BUDGET_MIN: ${{ github.event_name == 'schedule' && '60' || inputs.budget_min }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Node (for wrangler)
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      # No npm install (see discovery.yml) — every wrangler call is npx --yes wrangler@<pin>.

      - name: Snapshot current beaches from D1
        # Read-only. Classification reads water_class/version/attempts to build its
        # queue; the same SELECT + truncation guard as discovery.yml is used.
        run: |
          if ! npx --yes "wrangler@${WRANGLER_VERSION}" d1 execute "$DB_NAME" --remote --json \
            --command "SELECT id, osm_id, name, lat, lon, park_name, water_class, water_class_version, water_class_attempts FROM beaches" \
            > snapshot.json; then
            echo "::error::wrangler snapshot query failed (likely a bad CLOUDFLARE_API_TOKEN secret) — response below"
            cat snapshot.json
            exit 1
          fi
          echo "snapshot bytes: $(wc -c < snapshot.json)"
          total=$(npx --yes "wrangler@${WRANGLER_VERSION}" d1 execute "$DB_NAME" --remote --json \
            --command "SELECT COUNT(*) AS n FROM beaches" \
            | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const r=JSON.parse(s);console.log(r[0].results[0].n)})")
          snap=$(node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const p=JSON.parse(s);const rows=Array.isArray(p)?((p[0]&&p[0].results)||[]):[];console.log(rows.length)})" < snapshot.json)
          echo "snapshot rows: $snap / db rows: $total"
          if [ "$snap" != "$total" ]; then
            echo "::error::snapshot truncated ($snap of $total rows) — aborting so classification never runs on a partial table"
            exit 1
          fi

      - name: Run classification (emit SQL)
        run: |
          deno run --allow-net --allow-read --allow-write \
            scripts/discovery-batch.js \
            --snapshot snapshot.json \
            --out classify-delta.sql \
            --no-discovery \
            --classify-limit "${CLASSIFY_LIMIT:-150}" \
            --classify-budget-ms $(( ${CLASSIFY_BUDGET_MIN:-70} * 60000 ))
          echo "---- delta summary ----"
          # `grep -c` exits 1 on zero matches and this shell is `bash -eo
          # pipefail`, so a fully-drained queue (header-only delta, zero
          # UPDATEs — a SUCCESS) would fail the step without the `|| true`.
          # (discovery.yml needs no such guard: its delta always carries the
          # flag_history-retention DELETE + sync_meta statements.)
          statements=$(grep -c ';' classify-delta.sql || true)
          echo "statements: ${statements}"
          head -n 20 classify-delta.sql

      # always() — NOT !cancelled() — because a timeout-minutes job cancel sets the
      # cancelled() context true, so !cancelled() would SKIP these steps in exactly
      # the hard-cancel case the incremental flush exists for (the original
      # zero-progress bug). always() runs within the ~5-min cancellation grace
      # window — enough for one wrangler apply. It is safe on a genuine unrelated
      # failure (e.g. a bad CLOUDFLARE_API_TOKEN failing Snapshot leaves no delta
      # file): if-no-files-found: ignore makes upload a no-op, and the Apply step's
      # own empty/statement-less guard short-circuits before wrangler.
      - name: Upload SQL delta artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: classify-delta-sql
          path: classify-delta.sql
          if-no-files-found: ignore
          retention-days: 14

      - name: Apply SQL to production D1
        if: ${{ always() && env.APPLY == 'true' }}
        run: |
          # A SIGKILL landing mid-append can leave a torn trailing fragment with no
          # closing ';'. wrangler d1 execute --file splits on ';' and would send that
          # fragment as a statement, failing the WHOLE apply and losing every complete
          # UPDATE before it. Truncate the delta to its last complete ';'-terminated
          # statement so a torn tail can never reach wrangler.
          node -e "const fs=require('fs');const p='classify-delta.sql';if(!fs.existsSync(p)){process.exit(0)}const s=fs.readFileSync(p,'utf8');const i=s.lastIndexOf(';');fs.writeFileSync(p,i>=0?s.slice(0,i+1)+'\n':'')"
          # A missing/empty/statement-less delta applies as a harmless idempotent
          # no-op (emitted UPDATEs set absolute values), so guard before wrangler.
          if [ ! -s classify-delta.sql ] || ! grep -q ';' classify-delta.sql; then
            echo "no water-class statements — empty/partial no-op, skipping apply"
            exit 0
          fi
          if ! npx --yes "wrangler@${WRANGLER_VERSION}" d1 execute "$DB_NAME" --remote --file classify-delta.sql; then
            echo "::error::wrangler apply failed (check CLOUDFLARE_API_TOKEN secret and delta SQL)"
            exit 1
          fi
